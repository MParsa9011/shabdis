version: "3.9"

services:
  app:
    build: .
    container_name: tabarjin_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://tabarjin:${POSTGRES_PASSWORD}@db:5432/tabarjin?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ZIBAL_MERCHANT: ${ZIBAL_MERCHANT}
      MELIPAYAMAK_OTP_KEY: ${MELIPAYAMAK_OTP_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_SITE_NAME: شبدیس
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

  # سرویس یک‌بارمصرف برای ساخت/به‌روزرسانی جداول دیتابیس:
  #   docker compose run --rm migrate
  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://tabarjin:${POSTGRES_PASSWORD}@db:5432/tabarjin?schema=public
    command: sh -c "npm ci && npx prisma db push"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tools"]

  db:
    image: postgres:16-alpine
    container_name: tabarjin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tabarjin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tabarjin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabarjin -d tabarjin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
